version: '3.8'

services:
  im-gateway:
    build: .
    container_name: "im-gateway-${NODE_ENV:-dev}"
    command: ["${PORT:-8080}"]
    ports:
      - "${EXTERNAL_PORT:-8080}:${PORT:-8080}"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MAX_CONNECTIONS: ${MAX_CONNECTIONS:-1000}
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -ltn | grep :${PORT:-8080} || exit 1"]
      interval: ${HEALTH_CHECK_INTERVAL:-30s}
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - im-network

networks:
  im-network:
    driver: bridge